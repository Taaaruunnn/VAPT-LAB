<div class="flex min-h-screen items-center justify-center bg-slate-100 dark:bg-slate-900">

  <form
    [formGroup]="registerForm"
    (ngSubmit)="register()"
    class="w-full max-w-lg rounded-3xl border border-slate-200 bg-white p-8 shadow-xl dark:border-slate-800 dark:bg-slate-950">

    <h1 class="mb-2 text-3xl font-bold text-slate-900 dark:text-white">
      Create Account
    </h1>

    <p class="mb-8 text-slate-500">
      Join VAPT LAB
    </p>

    <!-- Full Name -->

    <input
      formControlName="fullName"
      type="text"
      placeholder="Full Name"
      class="mb-4 w-full rounded-xl border border-slate-300 bg-slate-50 p-3 outline-none focus:border-blue-500 dark:border-slate-700 dark:bg-slate-900 dark:text-white">

    <!-- Email -->

    <input
      formControlName="email"
      type="email"
      placeholder="Email Address"
      class="mb-4 w-full rounded-xl border border-slate-300 bg-slate-50 p-3 outline-none focus:border-blue-500 dark:border-slate-700 dark:bg-slate-900 dark:text-white">

    <!-- Password -->

    <input
      formControlName="password"
      type="password"
      placeholder="Password"
      class="mb-4 w-full rounded-xl border border-slate-300 bg-slate-50 p-3 outline-none focus:border-blue-500 dark:border-slate-700 dark:bg-slate-900 dark:text-white">

    <!-- Confirm Password -->

    <input
      formControlName="confirmPassword"
      type="password"
      placeholder="Confirm Password"
      class="mb-4 w-full rounded-xl border border-slate-300 bg-slate-50 p-3 outline-none focus:border-blue-500 dark:border-slate-700 dark:bg-slate-900 dark:text-white">
@if (
  registerForm.hasError('passwordMismatch') &&
  registerForm.get('confirmPassword')?.touched
) {

<p class="mt-2 text-sm text-red-500">
  Passwords do not match.
</p>

}
    <!-- Terms -->

    <label class="mb-6 flex items-center gap-3 text-sm text-slate-600 dark:text-slate-300">

      <input
        type="checkbox"
        formControlName="acceptTerms">

      I agree to the Terms & Conditions

    </label>

    <!-- Register -->

    <button
  type="submit"
  [disabled]="registerForm.invalid"
      class="w-full rounded-xl bg-blue-600 py-3 font-semibold text-white transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:bg-slate-400">

      Create Account

    </button>

    <p class="mt-6 text-center text-sm text-slate-500">

      Already have an account?

      <a
        routerLink="/login"
        class="font-semibold text-blue-600 hover:underline">

        Login

      </a>

    </p>

  </form>

</div>
