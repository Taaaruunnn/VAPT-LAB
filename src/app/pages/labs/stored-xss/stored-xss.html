<div class="max-w-6xl mx-auto space-y-8">

    <!-- Header -->

    <section
        class="rounded-3xl border border-red-500 bg-red-50 p-8 shadow-sm dark:border-blue-700 dark:bg-blue-950/30">

        <h1
            class="text-4xl font-bold text-blue-700 dark:text-blue-400">

            Stored XSS Lab

        </h1>

        <p
            class="mt-3 text-slate-600 dark:text-slate-400">

            This lab intentionally stores user input without sanitization.
            Comments are rendered as trusted HTML to demonstrate a real Stored XSS vulnerability.

        </p>

    </section>

    <!-- Comment Form -->

    <section
        class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900">

        <form
            [formGroup]="commentForm"
            class="space-y-5">

            <div>

                <label
                    class="mb-2 block font-medium text-slate-700 dark:text-slate-300">

                    Author

                </label>

                <input
                    type="text"
                    formControlName="author"
                    placeholder="Enter your name"
                    class="w-full rounded-xl border border-slate-300 bg-white p-3 text-slate-900 placeholder:text-slate-400 focus:border-red-500 focus:outline-none dark:border-slate-700 dark:bg-slate-950 dark:text-white">

            </div>

            <div>

                <label
                    class="mb-2 block font-medium text-slate-700 dark:text-slate-300">

                    Comment

                </label>

                <textarea
                    rows="5"
                    formControlName="content"
                    placeholder="Write your comment..."
                    class="w-full rounded-xl border border-slate-300 bg-white p-3 text-slate-900 placeholder:text-slate-400 focus:border-red-500 focus:outline-none dark:border-slate-700 dark:bg-slate-950 dark:text-white">
                </textarea>

            </div>

            <button
                type="button"
                (click)="submit()"
                class="rounded-xl bg-blue-700 px-8 py-3 font-semibold text-slate-100 transition hover:bg-slate-700">

                Submit Comment

            </button>

        </form>

    </section>

    <!-- Comments -->

    <section class="space-y-5">

        @for(comment of comments(); track comment._id){

            <div
                class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm transition hover:shadow-md dark:border-slate-800 dark:bg-slate-900">

                <div class="flex items-center justify-between gap-4">

    <div class="flex-1">

        <h3
            class="text-lg font-semibold text-blue-600 dark:text-blue-400">

            {{ comment.author }}

        </h3>

    </div>

    <button
        type="button"
        (click)="deleteComment(comment._id)"
        class="shrink-0 rounded-lg bg-blue-700 px-4 py-2 text-sm font-medium text-white transition hover:bg-slate-700">

        Delete

    </button>

</div>

                <div
                    class="mt-4 text-slate-700 dark:text-slate-300"
                    [innerHTML]="trustHtml(comment.content)">
                </div>

            </div>

        }

    </section>

</div>
