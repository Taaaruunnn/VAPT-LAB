<nav
  class="fixed top-0 left-0 right-0 z-50 h-[72px] border-b border-slate-200 bg-white/90 backdrop-blur-md transition-colors duration-300 dark:border-slate-800 dark:bg-slate-950/90">

  <div class="mx-auto flex h-full items-center justify-between px-6">

    <!-- Logo -->
    <button
  type="button"
  (click)="sidebarToggle.emit()"
  class="flex items-center gap-3">

      <lucide-icon
        [img]="Shield"
        class="h-8 w-8 text-blue-500">
      </lucide-icon>

      <div class="leading-tight">
        <h1 class="text-3xl font-bold tracking-wide text-slate-900 dark:text-white">
          VAPT LAB
        </h1>

        <p class="text-xs text-slate-500 dark:text-slate-400">
          Security Research Platform
        </p>
      </div>

    </button>

    <!-- Search -->

   <div class="relative hidden w-[480px] lg:block">

  <lucide-icon
    [img]="Search"
    class="pointer-events-none absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400">
  </lucide-icon>

  <input
    type="text"
    placeholder="Search vulnerabilities, users, reports..."
class="w-full rounded-2xl border border-slate-300 bg-slate-100 py-3 pl-14 pr-4 text-sm text-slate-900 placeholder:text-slate-500 outline-none transition-all duration-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 dark:border-slate-700 dark:bg-slate-900 dark:text-white dark:placeholder:text-slate-400"/>
</div>

    <!-- Right -->

    <div class="flex items-center gap-3">

      <!-- Theme -->

      <button
        (click)="themeService.toggleTheme()"
class="flex h-11 w-11 items-center justify-center rounded-xl border border-slate-300 bg-slate-100 transition-all duration-200 hover:border-blue-500 hover:bg-slate-200 dark:border-slate-700 dark:bg-slate-900 dark:hover:bg-slate-800">      @if(themeService.theme() === 'dark'){

       <lucide-icon
  [img]="Moon"
  class="h-5 w-5 text-white">
</lucide-icon>

        } @else {

        <lucide-icon
          [img]="Sun"
          class="h-5 w-5 text-yellow-500">
        </lucide-icon>

        }

      </button>

      <!-- Notification -->

      <div class="relative">

  <button
    (click)="toggleNotifications(); $event.stopPropagation()"
    class="relative flex h-11 w-11 items-center justify-center rounded-xl border border-slate-300 bg-slate-100 transition-all duration-200 hover:border-blue-500 hover:bg-slate-200 dark:border-slate-700 dark:bg-slate-900 dark:hover:bg-slate-800">

    <lucide-icon
      [img]="Bell"
      class="h-5 w-5 text-slate-700 dark:text-white">
    </lucide-icon>

    <span
      class="absolute -right-1 -top-1 flex h-5 w-5 items-center justify-center rounded-full bg-red-600 text-[10px] font-semibold text-white">

      3

    </span>

  </button>
  @if(notificationsOpen()){

<div
  (click)="$event.stopPropagation()"
  class="absolute right-0 mt-3 w-96 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-2xl dark:border-slate-700 dark:bg-slate-900">

  <div class="border-b border-slate-200 p-4 dark:border-slate-700">

    <h3 class="font-semibold text-slate-900 dark:text-white">

      Notifications

    </h3>

  </div>

  <div class="divide-y divide-slate-200 dark:divide-slate-700">

    <div class="p-4 hover:bg-slate-100 dark:hover:bg-slate-800">

      <p class="font-medium text-slate-900 dark:text-white">

        SQL Injection detected

      </p>

      <p class="text-sm text-slate-500">

        2 minutes ago

      </p>

    </div>

    <div class="p-4 hover:bg-slate-100 dark:hover:bg-slate-800">

      <p class="font-medium text-slate-900 dark:text-white">

        Scan completed

      </p>

      <p class="text-sm text-slate-500">

        12 minutes ago

      </p>

    </div>

    <div class="p-4 hover:bg-slate-100 dark:hover:bg-slate-800">

      <p class="font-medium text-slate-900 dark:text-white">

        New report generated

      </p>

      <p class="text-sm text-slate-500">

        1 hour ago

      </p>

    </div>

  </div>

</div>

}
      </div>

      <!-- Profile -->

      <div class="relative">

  <button
    (click)="toggleDropdown(); $event.stopPropagation()"
    class="flex items-center gap-3 rounded-xl border border-slate-300 bg-slate-100 px-4 py-2 transition-all duration-200 hover:border-blue-500 hover:bg-slate-200 dark:border-slate-700 dark:bg-slate-900 dark:hover:bg-slate-800">

    <div
      class="flex h-9 w-9 items-center justify-center rounded-full bg-blue-600">

      <lucide-icon
        [img]="User"
        class="h-5 w-5 text-white">
      </lucide-icon>

    </div>

    <div class="hidden text-left lg:block">

      <p class="text-sm font-semibold text-slate-900 dark:text-white">

        {{ authService.currentUser()?.name }}

      </p>

      <p class="text-xs text-slate-500 dark:text-slate-400">

        {{ authService.currentUser()?.role }}

      </p>

    </div>

    <lucide-icon
      [img]="ChevronDown"
      class="hidden h-4 w-4 text-slate-500 lg:block">
    </lucide-icon>

  </button>
  @if (dropdownOpen()) {

<div
  (click)="$event.stopPropagation()"
  class="absolute right-0 mt-3 w-64 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-2xl dark:border-slate-700 dark:bg-slate-900">

  <div class="border-b border-slate-200  dark:border-slate-700">

    

  

  <button routerLink="/labs/profile/{{ authService.currentUser()?.id }}"
    class="w-full px-4 py-3 text-left transition hover:bg-slate-100 dark:hover:bg-slate-800">

    My Profile

  </button>
</div>
  <button routerLink="/settings"
    class="w-full px-4 py-3 text-left transition hover:bg-slate-100 dark:hover:bg-slate-800">

    Settings

  </button>

  <button
    (click)="logout()"
    class="w-full border-t border-slate-200 px-4 py-3 text-left text-red-600 transition hover:bg-red-50 dark:border-slate-700 dark:hover:bg-red-950/40">

    Logout

  </button>

</div>

}
      </div>

    </div>

  </div>

</nav>
